<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot Password (Node OTP)</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 520px; margin: 40px auto; padding: 0 16px; }
    form { border: 1px solid #ddd; border-radius: 8px; padding: 14px; margin-bottom: 14px; }
    input { width: 100%; padding: 8px; margin: 6px 0 10px; box-sizing: border-box; }
    button { padding: 10px 12px; cursor: pointer; }
    #msg { font-weight: 700; }
  </style>
</head>
<body>
  <h2>Forgot Password</h2>

  <form id="requestForm">
    <h3>1. Request OTP</h3>
    <input type="email" id="email" placeholder="Enter your email" required />
    <button type="submit">Send OTP</button>
  </form>

  <form id="verifyForm">
    <h3>2. Verify OTP</h3>
    <input type="text" id="otp" placeholder="Enter OTP" required />
    <button type="submit">Verify OTP</button>
  </form>

  <form id="resetForm">
    <h3>3. Reset Password</h3>
    <input type="password" id="newPassword" placeholder="New password" required />
    <input type="password" id="confirmPassword" placeholder="Confirm new password" required />
    <button type="submit">Reset Password</button>
  </form>

  <p id="msg"></p>

  <script>
    // Base URL of the Node OTP backend.
    var API = "http://localhost:4000";
    var msg = document.getElementById("msg");

    function show(text, ok) {
      msg.textContent = text;
      msg.style.color = ok ? "green" : "crimson";
    }

    // Helper for making POST requests to the backend.
    async function call(path, body) {
      var response = await fetch(API + path, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body)
      });

      if (!response.ok) {
        var errorData = await response.json().catch(function () {
          return { message: "Request failed." };
        });
        throw new Error(errorData.message || "Request failed.");
      }

      return response.json();
    }

    document.getElementById("requestForm").addEventListener("submit", async function (event) {
      event.preventDefault();
      try {
        var email = document.getElementById("email").value.trim();
        var data = await call("/api/auth/forgot-password/request", { email: email });
        show(data.message, !!data.success);
      } catch (error) {
        show(error.message, false);
      }
    });

    document.getElementById("verifyForm").addEventListener("submit", async function (event) {
      event.preventDefault();
      try {
        var email = document.getElementById("email").value.trim();
        var otp = document.getElementById("otp").value.trim();
        var data = await call("/api/auth/forgot-password/verify-otp", { email: email, otp: otp });
        show(data.message, !!data.success);
      } catch (error) {
        show(error.message, false);
      }
    });

    document.getElementById("resetForm").addEventListener("submit", async function (event) {
      event.preventDefault();
      try {
        var email = document.getElementById("email").value.trim();
        var newPassword = document.getElementById("newPassword").value;
        var confirmPassword = document.getElementById("confirmPassword").value;

        if (newPassword !== confirmPassword) {
          show("Passwords do not match.", false);
          return;
        }

        var data = await call("/api/auth/forgot-password/reset", {
          email: email,
          newPassword: newPassword
        });
        show(data.message, !!data.success);
      } catch (error) {
        show(error.message, false);
      }
    });
  </script>
</body>
</html>
