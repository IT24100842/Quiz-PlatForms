# =============================================
# Profile: MySQL (recommended local/production)
# Activate with APP_DB_PROFILE=mysql
# =============================================
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:quiz_platform}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# This project keeps schema scripts per database manually.
# Hibernate (ddl-auto=update) will keep missing columns/tables in sync.
spring.sql.init.mode=never
