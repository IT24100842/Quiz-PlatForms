# =============================================
# Quiz Platform Backend – application.properties
# =============================================

server.port=8080

# =============================================
# DATABASE — Active profile
# Options: mysql, h2, mssql
# You can override with environment variable APP_DB_PROFILE
# =============================================
spring.profiles.active=${APP_DB_PROFILE:mysql}

# =============================================
# JPA / Hibernate (shared)
# =============================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# =============================================
# Mail provider (forgot-password emails)
# MAIL_PROVIDER options:
#   gmail-api  -> Google Cloud Console OAuth credentials
#   smtp       -> Gmail SMTP app password
# If MAIL_PROVIDER is not set, SMTP is used by default.
#
# Google Cloud (gmail-api) env vars:
#   MAIL_ENABLED=true
#   MAIL_PROVIDER=gmail-api
#   GMAIL_CLIENT_ID=xxxxx.apps.googleusercontent.com
#   GMAIL_CLIENT_SECRET=xxxxx
#   GMAIL_REFRESH_TOKEN=xxxxx
#   GMAIL_SENDER=yourgmail@gmail.com
#
# SMTP fallback env vars:
#   MAIL_ENABLED=true
#   MAIL_PROVIDER=smtp
#   MAIL_USERNAME=yourgmail@gmail.com
#   MAIL_APP_PASSWORD=your_16_char_gmail_app_password
#   MAIL_FROM=yourgmail@gmail.com
# =============================================
app.mail.enabled=${MAIL_ENABLED:false}
app.mail.provider=${MAIL_PROVIDER:smtp}
app.mail.from=${MAIL_FROM:${MAIL_USERNAME:}}
app.mail.gmail.client-id=${GMAIL_CLIENT_ID:}
app.mail.gmail.client-secret=${GMAIL_CLIENT_SECRET:}
app.mail.gmail.refresh-token=${GMAIL_REFRESH_TOKEN:}
app.mail.gmail.sender=${GMAIL_SENDER:${MAIL_USERNAME:}}

# =============================================
# Google Sign-In (OAuth 2.0 Authorization Code)
# =============================================
# GOOGLE_AUTH_ENABLED=true
# GOOGLE_AUTH_CLIENT_ID=xxxxx.apps.googleusercontent.com
# GOOGLE_AUTH_CLIENT_SECRET=xxxxx
# GOOGLE_AUTH_REDIRECT_URI=http://localhost:8080/api/auth/oauth/google/callback
app.auth.google.enabled=${GOOGLE_AUTH_ENABLED:false}
app.auth.google.client-id=${GOOGLE_AUTH_CLIENT_ID:}
app.auth.google.client-secret=${GOOGLE_AUTH_CLIENT_SECRET:}
app.auth.google.redirect-uri=${GOOGLE_AUTH_REDIRECT_URI:http://localhost:8080/api/auth/oauth/google/callback}

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_APP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# =============================================
# Logging
# =============================================
logging.level.com.quizplatform=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
