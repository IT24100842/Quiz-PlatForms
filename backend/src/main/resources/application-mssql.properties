# =============================================
# Profile: MS SQL Server
# Activate with: APP_DB_PROFILE=mssql
# =============================================

# Connection String
spring.datasource.url=jdbc:sqlserver://${MSSQL_HOST:localhost}:${MSSQL_PORT:1434};databaseName=${MSSQL_DB:Quiz Platform};encrypt=${MSSQL_ENCRYPT:true};trustServerCertificate=${MSSQL_TRUST_SERVER_CERT:true}
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# SQL Authentication (when not using Windows auth)
spring.datasource.username=${MSSQL_USERNAME:quiz_app_user}
spring.datasource.password=${MSSQL_PASSWORD:}

# Hibernate / JPA
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Connection pooling
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000

