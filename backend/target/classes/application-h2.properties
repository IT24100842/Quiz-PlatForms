# =============================================
# Profile: H2 in-memory (local dev — no SQL Server needed)
# Data is wiped when the server stops.
# =============================================
spring.datasource.url=jdbc:h2:mem:quizplatformdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MSSQLServer
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.open-in-view=false

# Let Hibernate create tables; the existing schema.sql is SQL Server specific.
spring.sql.init.mode=never

# H2 web console — open http://localhost:8080/h2-console to inspect data
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
